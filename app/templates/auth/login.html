{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 50vh;">
    <div class="col-md-6 col-lg-4">
        <div class="glass-panel p-5">
            <div class="text-center mb-4">
                <i class="bi bi-person-bounding-box" style="font-size: 3rem; color: var(--primary-color);"></i>
                <h2 class="mt-3">歡迎回來</h2>
                <p class="text-muted small">登入以繼續您的學習旅程</p>
            </div>
            
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label">電子信箱</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">密碼</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">登入</button>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-muted small">還沒有帳號嗎？ <a href="{{ url_for('auth.register') }}" class="text-primary text-decoration-none fw-bold">立即註冊</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
