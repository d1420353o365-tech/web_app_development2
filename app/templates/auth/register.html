{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 50vh;">
    <div class="col-md-6 col-lg-4">
        <div class="glass-panel p-5">
            <div class="text-center mb-4">
                <i class="bi bi-rocket-takeoff" style="font-size: 3rem; color: var(--primary-color);"></i>
                <h2 class="mt-3">建立新帳號</h2>
                <p class="text-muted small">馬上開啟智慧學習計畫</p>
            </div>
            
            <form action="{{ url_for('auth.register') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">使用者名稱</label>
                    <input type="text" class="form-control" id="username" name="username" required placeholder="阿滴">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">電子信箱</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">密碼</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="設定高強度密碼">
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">註冊帳號</button>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-muted small">已經有帳號了？ <a href="{{ url_for('auth.login') }}" class="text-primary text-decoration-none fw-bold">登入</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
